<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kvinta</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
  <div id="app">

    <!-- ===== Боковая панель ===== -->
    <aside id="sidebar">
      <div class="logo">
        <svg viewBox="0 0 44 44" class="logo-mark">
          <defs>
            <linearGradient id="lg" x1="0" y1="1" x2="1" y2="0">
              <stop offset="0" stop-color="#ff1e42"/>
              <stop offset="1" stop-color="#ff6a3d"/>
            </linearGradient>
          </defs>
          <rect x="3"  y="16" width="5" height="12" rx="2.5" fill="url(#lg)"/>
          <rect x="12" y="9"  width="5" height="26" rx="2.5" fill="url(#lg)"/>
          <rect x="21" y="3"  width="5" height="38" rx="2.5" fill="url(#lg)"/>
          <rect x="30" y="11" width="5" height="22" rx="2.5" fill="url(#lg)"/>
          <rect x="39" y="18" width="2" height="8"  rx="1"   fill="url(#lg)"/>
        </svg>
        <span class="logo-text">KVINTA</span>
      </div>

      <nav id="nav">
        <button class="nav-item active" data-view="new">
          <svg viewBox="0 0 24 24"><path d="M13.5 2s.5 3-1.5 5.5S8 11 8 14a4 4 0 0 0 8 0c0-1.5-.7-2.6-.7-2.6s2.7.6 3.5 3.6c.9 3.4-1.3 7-6.8 7S4 18.4 4 14.5C4 8 10 6.5 10.5 2c0 0 1.7-.6 3 0z"/></svg>
          Новые треки
        </button>
        <button class="nav-item" data-view="search">
          <svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 1 0 4.9 14.3l4.4 4.4 1.4-1.4-4.4-4.4A8 8 0 0 0 10 2zm0 2a6 6 0 1 1 0 12 6 6 0 0 1 0-12z"/></svg>
          Поиск
        </button>
        <button class="nav-item" data-view="foryou">
          <svg viewBox="0 0 24 24"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4z"/></svg>
          Для тебя
        </button>
        <button class="nav-item" data-view="favorites">
          <svg viewBox="0 0 24 24"><path d="M12 21s-8-5.3-10-10C.6 7.5 3 4 6.5 4 9 4 11 6 12 7.5 13 6 15 4 17.5 4 21 4 23.4 7.5 22 11c-2 4.7-10 10-10 10z"/></svg>
          Избранное
        </button>
        <button class="nav-item" data-view="playlists">
          <svg viewBox="0 0 24 24"><path d="M3 6h12v2H3zm0 4h12v2H3zm0 4h8v2H3zm14-8v8.3a3.5 3.5 0 1 0 2 3.2V9h3V6z"/></svg>
          Плейлисты
        </button>
        <button class="nav-item" data-view="downloads">
          <svg viewBox="0 0 24 24"><path d="M12 3v10l4-4 1.4 1.4L12 15.8 6.6 10.4 8 9l3 3V3zM5 19h14v2H5z"/></svg>
          Загрузки
        </button>
        <button class="nav-item" data-view="settings">
          <svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm9.4 4a7.6 7.6 0 0 0-.1-1.2l2.1-1.6-2-3.5-2.5 1a7.7 7.7 0 0 0-2-1.2L16.5 3h-4l-.4 2.5a7.7 7.7 0 0 0-2 1.2l-2.5-1-2 3.5 2.1 1.6a7.7 7.7 0 0 0 0 2.4L1.6 14.8l2 3.5 2.5-1a7.7 7.7 0 0 0 2 1.2l.4 2.5h4l.4-2.5a7.7 7.7 0 0 0 2-1.2l2.5 1 2-3.5-2.1-1.6c.1-.4.1-.8.1-1.2z"/></svg>
          Настройки
        </button>
      </nav>

      <div class="sidebar-section">
        <div class="sidebar-section-head">
          <span>Мои плейлисты</span>
          <button id="btnNewPlaylist" title="Создать плейлист">+</button>
        </div>
        <div id="sidebarPlaylists"></div>
      </div>

      <div class="sidebar-footer">каталог: Яндекс Музыка<br>© MortisClub 2026</div>
    </aside>

    <!-- ===== Основная область ===== -->
    <main id="main">
      <div id="viewContainer"></div>
    </main>

    <!-- ===== Нижний плеер ===== -->
    <footer id="playerbar">
      <div class="pb-left">
        <div id="pbCover" class="pb-cover"></div>
        <div class="pb-meta">
          <div id="pbTitle" class="pb-title">Kvinta</div>
          <div id="pbArtist" class="pb-artist">выбери трек — и поехали</div>
        </div>
        <button id="pbLike" class="icon-btn like-btn" title="В избранное">
          <svg viewBox="0 0 24 24"><path d="M12 21s-8-5.3-10-10C.6 7.5 3 4 6.5 4 9 4 11 6 12 7.5 13 6 15 4 17.5 4 21 4 23.4 7.5 22 11c-2 4.7-10 10-10 10z"/></svg>
        </button>
      </div>

      <div class="pb-center">
        <div class="pb-controls">
          <button id="pbShuffle" class="icon-btn" title="Перемешать">
            <svg viewBox="0 0 24 24"><path d="M17 4l4 3.5L17 11V8.5h-2.6l-8 7H3v-2h2.6l8-7H17zM3 6h3.4l2.3 2-1.5 1.3L5.6 8H3zm12.4 7.7L17 15.5V13l4 3.5L17 20v-2.5h-3.6l-2.3-2z"/></svg>
          </button>
          <button id="pbPrev" class="icon-btn" title="Назад">
            <svg viewBox="0 0 24 24"><path d="M6 5h2v14H6zm12 0v14l-9-7z"/></svg>
          </button>
          <button id="pbPlay" class="play-btn" title="Играть/пауза">
            <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
          </button>
          <button id="pbNext" class="icon-btn" title="Вперёд">
            <svg viewBox="0 0 24 24"><path d="M16 5h2v14h-2zM6 5l9 7-9 7z"/></svg>
          </button>
          <button id="pbRepeat" class="icon-btn" title="Повтор">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2z"/></svg>
            <span id="repeatOne">1</span>
          </button>
        </div>
        <div class="pb-progress">
          <span id="pbTimeCur">0:00</span>
          <input type="range" id="pbSeek" min="0" max="1000" value="0">
          <span id="pbTimeTotal">0:00</span>
        </div>
      </div>

      <div class="pb-right">
        <button id="pbEq" class="icon-btn" title="Эквалайзер">
          <svg viewBox="0 0 24 24"><path d="M5 4h2v7H5zm0 11h2v5H5zm6-11h2v3h-2zm0 7h2v9h-2zm6-7h2v11h-2zm0 15h2v1h-2zM3 11h6v2H3zm6-2h6v2H9zm6 8h6v2h-6z"/></svg>
        </button>
        <svg class="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1a7 7 0 0 1 0 13.4v2.1a9 9 0 0 0 0-17.6z"/></svg>
        <input type="range" id="pbVolume" min="0" max="100" value="80">
      </div>
    </footer>
  </div>

  <!-- Меню «добавить в плейлист» -->
  <div id="ctxMenu" class="ctx-menu" style="display:none"></div>
  <!-- Тосты -->
  <div id="toasts"></div>

  <audio id="audio" crossorigin="anonymous"></audio>
  <script src="config.gen.js"></script>
  <script src="md5.js"></script>
  <script src="native.js"></script>
  <script src="app.js"></script>
</body>
</html>
